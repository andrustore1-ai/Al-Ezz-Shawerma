:root{--brand:#EA580B;--brand2:#FB923C;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--soft:#f8fafc;--shadow:0 16px 40px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fff 0,#f8fafc 58%,#fff7ed 100%);font-family:'Cairo',Tahoma,Arial,sans-serif;color:var(--ink)}button,input,textarea,select{font-family:inherit}.shell{width:min(1180px,100%);margin:auto;padding:0 18px}.top{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.topIn{height:76px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brandMini{display:flex;align-items:center;gap:10px;min-width:0}.logoMini{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-weight:900;overflow:hidden;box-shadow:0 12px 30px rgba(234,88,11,.18)}.logoMini img{width:100%;height:100%;object-fit:cover}.brandMini b{font-size:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.iconBtn{width:54px;height:54px;border:0;border-radius:20px;background:#fff;color:var(--brand);display:grid;place-items:center;cursor:pointer;box-shadow:0 10px 26px rgba(15,23,42,.08);position:relative}.badge{position:absolute;top:-5px;right:-5px;min-width:23px;height:23px;border-radius:999px;background:#ef4444;color:#fff;border:3px solid #fff;display:grid;place-items:center;font-size:11px;font-weight:900}.hero{padding:20px 0 10px}.banner{display:none;border-radius:34px;min-height:240px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:var(--shadow);margin-bottom:18px}.banner.show{display:block}.banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.banner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,0,0,.18),rgba(0,0,0,.44))}.bannerTxt{position:relative;z-index:2;color:#fff;padding:4 0vw);height:100%;background:#fff;padding:18px;box-shadow:-20px 0 60px rgba(0,0,0,.2);overflow:auto}.drawerHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.drawerProfile{text-align:center;background:#f8fafc;border:1px solid var(--line);border-radius:28px;padding:18px}.drawerLogo{width:88px;height:88px;border-radius:30px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-weight:900;font-size:28px;margin:0 auto 10px;overflow:hidden}.drawerLogo img{width:100%;height:100%;object-fit:cover}.tableBox{margin-top:12px;background:#fff7ed;color:#9a3412;border-radius:18px;padding:10px;font-weight:900}.socials{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:14px}.socials a{width:42px;height:42px;border-radius:16px;background:#fff;color:var(--brand);border:1px solid var(--line);display:grid;place-items:center;text-decoration:none}.paymentMethodsBox{margin-top:14px;text-align:right;display:grid;gap:9px}.paymentMethodsBox h3{margin:0 0 4px;color:#9a3412;font-size:15px}.payMethodCard{background:#fff;border:1px solid #fed7aa;border-radius:18px;padding:11px 12px;box-shadow:0 8px 18px rgba(234,88,11,.06)}.payMethodCard b{display:block;color:#7c2d12;margin-bottom:4px}.payMethodCard span{display:block;color:#475569;font-weight:850;font-size:12px;line-height:1.7}.drawerLinks{display:grid;gap:10px;margin-top:16px}.drawerLinks button{padding:14px 16px;border-radius:18px;background:#fff7ed;color:#9a3412;text-decoration:none;font-weight:900;border:0;text-align:right;cursor:pointer}.cartPanel,.ordersPanel{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:min(760px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:34px 34px 0 0;padding:18px}.cartItem{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.qty{display:flex;gap:8px;align-items:center}.qty button{width:32px;height:32px;border:0;border-radius:12px;background:#f1f5f9;font-weight:900}.checkoutGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:13px;outline:none;font-weight:800}.totalsBox{background:#f8fafc;border:1px solid var(--line);border-radius:20px;padding:12px;margin-top:12px}.totalLine{display:flex;justify-content:space-between;padding:4px 0;font-weight:900;color:#475569}.totalLine.big{color:var(--brand);font-size:20px;border-top:1px dashed #cbd5e1;margin-top:6px;padding-top:10px}.primary{border:0;background:var(--brand);color:white;border-radius:18px;padding:14px 16px;font-weight:900;cursor:pointer}.light{border:0;background:#f8fafc;color:#334155;border-radius:18px;padding:14px 16px;font-weight:900;cursor:pointer}.orderCard{border:1px solid var(--line);border-radius:24px;padding:14px;margin-bottom:12px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.04)}.pill{display:inline-flex;border-radius:999px;padding:4px 10px;background:#f1f5f9;color:#475569;font-weight:900;font-size:12px}.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:120;width:min(520px,calc(100% - 28px));padding:14px 18px;border-radius:18px;background:#111827;color:#fff;font-weight:900;text-align:center;display:none}.toast.show{display:block}.toast.err{background:#b91c1c}@media(max-width:980px){.layout{display:block}.cats{position:static;display:flex;overflow:auto;gap:8px;border-radius:0;background:transparent;border:0;box-shadow:none;padding:6px 0 14px}.cats h3{display:none}.catBtn{width:auto;white-space:nowrap;margin:0}.products,.skeletonGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.bottom{display:flex}.bannerTxt h1{font-size:34px}.banner{min-height:210px}}@media(max-width:560px){.shell{padding:0 14px}.topIn{height:72px}.brandMini b{font-size:18px}.logoMini{width:44px;height:44px}.iconBtn{width:50px;height:50px}.banner{border-radius:28px;min-height:185px}.bannerTxt{padding:30px 22px}.banne </style></head><body><div id="toast" class="toast"></div><div class="top"><div class="shell topIn"><button class="iconBtn" onclick="openDrawer()" id="menuIcon"></button><div class="brandMini"><div class="logoMini" id="topLogo"></div><b id="topName">المنيو</b></div><button class="iconBtn" onclick="openCart()"><span id="cartIcon"></span><span id="cartBadge" class="badge" style="display:none">0</span></button></div></div><main class="shell"><section class="hero"><div id="banner" class="banner"><img id="bannerImg" alt=""><div class="bannerTxt"><h1 id="bannerTitle"></h1><p id="bannerSub"></p></div></div><div id="outside" class="outside"><div class="ico" id="outsideIcon"></div><div><h3 id="outsideTitle"></h3><p id="outsideText"></p></div></div><div class="searchBox"><span class="ico" id="searchIcon"></span><input id="search" placeholder="ابحث عن وجبتك المفضلة..." oninput="render()"></div><div id="tableNote" class="tableNote"></div></section><section class="layout"><aside class="cats" id="cats"></aside><section><div class="products" id="products"></div><div id="skeleton" class="skeletonGrid"></div><div id="empty" class="empty" style="display:none">لا توجد منتجات حالياً. أضف المنتجات من لوحة الإدارة.</div></section></section></main><nav class="bottom"><button class="active" onclick="scrollTo({top:0,behavior:'smooth'})"><span id="homeIcon"></span><br>المنيو</button><button onclick="openCart()"><span id="bottomCartIcon"></span><br>السلة</button><button onclick="openOrders()"><span id="ordersIcon"></span><br>طلباتي</button></nav><div id="drawer" class="drawer" onclick="if(event.target.id==='drawer')closeDrawer()"><div class="drawerPanel"><div class="drawerHead"><b>القائمة</b><button class="iconBtn" onclick="closeDrawer()" id="closeIcon"></button></div><div class="drawerProfile"><div class="drawerLogo" id="drawerLogo"></div><h2 id="drawerName">المنيو</h2><div id="drawerTable" class="tableBox" style="display:none"></div><div class="socials" id="drawerSocials"></div><div id="drawerPayments" class="paymentMethodsBox"></div></div><div class="drawerLinks"><button onclick="closeDrawer();scrollTo({top:0,behavior:'smooth'})">الرئيسية</button><button onclick="closeDrawer();openOrders()">طلباتي</button></div></div></div><div id="cartModal" class="cartModal" onclick="if(event.target.id==='cartModal')closeCart()"><div class="cartPanel"><div class="row"><h2>السلة</h2><button class="iconBtn" onclick="closeCart()" id="closeIcon2"></button></div><div id="cartItems"></div><div id="deliveryBox" style="display:none;margin-top:12px"><label style="font-weight:900;color:#475569">منطقة التوصيل</label><select id="regionSelect" class="field" onchange="selectedRegion=this.value;localStorage.setItem('r7_region',selectedRegion);renderCart()"></select></div><div class="totalsBox"><div class="totalLine"><span>المجموع</span><span id="subTotal">0</span></div><div class="totalLine" id="shipLine" style="display:none"><span>رسوم التوصيل</span><span id="shipFee">0</span></div><div class="totalLine big"><span>الإجمالي</span><span id="cartTotal">0</span></div></div><div class="checkoutGrid"><input id="customerName" class="field" placeholder="اسم الزبون اختياري"><input id="customerPhone" class="field" placeholder="رقم الجوال اختياري"><textarea id="note" class="field" placeholder="ملاحظة" style="grid-column:1/-1;min-height:80px"></textarea></div><div class="checkoutGrid"><button class="primary" onclick="sendKitchen()">إرسال للمطبخ مباشرة</button><button class="light" onclick="sendWhatsapp()">إرسال واتساب</button></div></div></div><div id="ordersModal" class="ordersModal" onclick="if(event.target.id==='ordersModal')closeOrders()"><div class="ordersPanel"><div class="row"><h2>طلباتي</h2><button class="iconBtn" onclick="closeOrders()" id="closeIcon3"></button></div><div id="myOrders"></div></div></div><script src="firebase.js"></script><script src="r7-core.js"></script><script src="r7-local-bridge.js"></script><script src="restaurant-production-pos.js"></script><script>
let settings=R7F.settingsWithDefaults(null),categories={},products={},orders={},activeCat='all',cart=JSON.parse(localStorage.getItem('r7_cart')||'[]'),selectedRegion=localStorage.getItem('r7_region')||'',productsLoaded=false,categoriesLoaded=false;const tableNo=new URLSearchParams(location.search).get('table')||'';const customerDevice=R7F.deviceId();const $=id=>document.getElementById(id);function toast(m,t=''){const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}function esc(s){return R7F.escapeHtml(s)}function deliveryRegions(){return R7F.list(settings.deliveryRegions).filter(r=>r.active!==false&&r.name).sort(R7F.sortBySort)}function currentRegion(){return deliveryRegions().find(r=>r.id===selectedRegion)||null}function currentShippingFee(){return tableNo?0:Number((currentRegion()||{}).fee||0)}function applyTheme(){document.documentElement.style.setProperty('--brand',settings.themeColor);$('topName').textContent=settings.name||'المنيو';document.title=(settings.name||'المنيو');const logo=settings.logoImage?`<img src="${esc(settings.logoImage)}">`:esc(settings.logoText||'');$('topLogo').innerHTML=logo||R7F.icon('products',24);$('drawerLogo').innerHTML=logo||R7F.icon('products',28);$('drawerName').textContent=settings.name||'المنيو';$('menuIcon').innerHTML=R7F.icon('menu');$('cartIcon').innerHTML=R7F.icon('cart');$('bottomCartIcon').innerHTML=R7F.icon('cart');$('homeIcon').innerHTML=R7F.icon('home');$('ordersIcon').innerHTML=R7F.icon('reports');$('closeIcon').innerHTML=R7F.icon('close');$('closeIcon2').innerHTML=R7F.icon('close');$('closeIcon3').innerHTML=R7F.icon('close');$('searchIcon').innerHTML=R7F.icon('search');$('outsideIcon').innerHTML=R7F.icon('whatsapp');if(settings.bannerEnabled&&(settings.bannerImage||settings.bannerTitle||settings.bannerSubtitle)){$('banner').classList.add('show');$('bannerImg').src=settings.bannerImage||'';$('bannerImg').style.display=settings.bannerImage?'block':'none';$('bannerTitle').textContent=settings.bannerTitle||'';$('bannerSub').textContent=settings.bannerSubtitle||''}else $('banner').classList.remove('show');if(settings.outsideEnabled){$('outside').classList.add('show');$('outsideTitle').textContent=settings.outsideTitle||'طلب خارج المطعم';$('outsideText').textContent=settings.outsideText||''}else $('outside').classList.remove('show');if(tableNo){$('tableNote').style.display='block';$('tableNote').textContent='أنت تطلب من طاولة رقم '+tableNo;$('drawerTable').style.display='block';$('drawerTable').textContent='رقم الطاولة: '+tableNo}else{$('tableNote').style.display='none';$('drawerTable').style.display='none'}renderSocials();updateCartBadge()}function renderSocials(){const arr=R7F.list(settings.socials).filter(s=>s.active!==false&&s.url).sort(R7F.sortBySort);$('drawerSocials').innerHTML=arr.map(s=>`<a href="${esc(R7F.socialLink(s.type,s.url))}" target="_blank" title="${esc(s.label||s.type)}">${R7F.icon(s.type,20)}</a>`).join('')||'<span style="color:#94a3b8;font-weight:900">لا توجد روابط تواصل</span>'}function renderSkeleton(){$('skeleton').innerHTML=Array.from({length:6}).map(()=>'<div class="sk"><div class="skImg"></div><div class="skLine"></div><div class="skLine sm"></div></div>').join('');$('products').innerHTML='';$('empty').style.display='none'}function render(){applyTheme();const cats=R7F.list(categories).filter(c=>c.active!==false).sort(R7F.sortBySort);$('cats').innerHTML='<h3>الأقسام</h3><button class="catBtn '+(activeCat==='all'?'active':'')+'" onclick="activeCat=\'all\';render()">'+R7F.icon('products',18)+' الكل</button>'+cats.map(c=>`<button class="catBtn ${activeCat===c.id?'active':''}" onclick="activeCat='${esc(c.id)}';render()">${R7F.icon(c.icon||'products',18)} ${esc(c.name||'قسم')}</button>`).join('');if(!productsLoaded){renderSkeleton();return}$('skeleton').innerHTML='';const q=$('search').value.trim().toLowerCase();let arr=R7F.list(products).filter(p=>p.active!==false).sort(R7F.sortBySort);if(activeCat!=='all')arr=arr.filter(p=>p.categoryId===activeCat);if(q)arr=arr.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));$('products').innerHTML=arr.map(p=>`<article class="card"><div class="pic">${p.image?`<img src="${esc(p.image)}">`:R7F.icon(p.icon||'products',42)}</div><div class="info"><h3>${esc(p.name)}</h3><div class="desc">${esc(p.description||'')}</div><div class="row"><div class="price">${R7F.money(p.price,settings.currency)}</div><button class="add" onclick="addCart('${esc(p.id)}')">${R7F.icon('plus',18)} إضافة</button></div></div></article>`).join('');$('empty').style.display=arr.length?'none':'block'}function addCart(id){const p={id,...(products[id]||{})};const existing=cart.find(i=>i.id===id);if(existing)existing.qty++;else cart.push({id:p.id,name:p.name,price:Number(p.price||0),image:p.image||'',qty:1});saveCart();toast('تمت الإضافة للسلة')}function saveCart(){localStorage.setItem('r7_cart',JSON.stringify(cart));updateCartBadge();renderCart()}function updateCartBadge(){const n=cart.reduce((a,i)=>a+Number(i.qty||0),0);$('cartBadge').style.display=n?'grid':'none';$('cartBadge').textContent=n}function openCart(){renderCart();$('cartModal').classList.add('show')}function closeCart(){$('cartModal').classList.remove('show')}function openDrawer(){$('drawer').classList.add('show')}function closeDrawer(){$('drawer').classList.remove('show')}function renderDeliverySelect(){const regs=deliveryRegions();const box=$('deliveryBox');if(tableNo||!regs.length){box.style.display='none';return}box.style.display='block';if(!selectedRegion||!regs.some(r=>r.id===selectedRegion)){selectedRegion=regs[0]?.id||'';localStorage.setItem('r7_region',selectedRegion)}$('regionSelect').innerHTML=regs.map(r=>`<option value="${esc(r.id)}" ${r.id===selectedRegion?'selected':''}>${esc(r.name)} — ${R7F.money(r.fee,settings.currency)}</option>`).join('')}function renderCart(){renderDeliverySelect();$('cartItems').innerHTML=cart.length?cart.map((i,idx)=>`<div class="cartItem"><div style="flex:1"><b>${esc(i.name)}</b><div style="color:#64748b;font-weight:800">${R7F.money(i.price,settings.currency)}</div></div><div class="qty"><button onclick="cart[${idx}].qty=Math.max(1,cart[${idx}].qty-1);saveCart()">-</button><b>${i.qty}</b><button onclick="cart[${idx}].qty++;saveCart()">+</button><button onclick="cart.splice(${idx},1);saveCart()" style="color:#dc2626">×</button></div></div>`).join(''):'<div class="empty">السلة فارغة</div>';const fee=currentShippingFee();const t=R7F.totals(cart,settings,{shippingFee:fee});$('subTotal').textContent=R7F.money(t.subtotal,settings.currency);$('shipLine').style.display=fee?'flex':'none';$('shipFee').textContent=R7F.money(fee,settings.currency);$('cartTotal').textContent=R7F.money(t.total,settings.currency)}function orderData(channel){if(!tableNo&&deliveryRegions().length&&!selectedRegion)throw new Error('اختر منطقة التوصيل');const region=currentRegion();const t=R7F.totals(cart,settings,{shippingFee:currentShippingFee()});return {orderNo:R7F.orderNo('ORD'),source:tableNo?'table':'menu',channel,status:channel==='whatsapp'?'whatsapp_sent':'new',table:tableNo,customerDevice,shippingRegion:region?region.name:'',shippingFee:currentShippingFee(),customer:{name:$('customerName').value.trim(),phone:$('customerPhone').value.trim()},note:$('note').value.trim(),items:cart.map(x=>({...x})),subtotal:t.subtotal,service:t.service,tax:t.tax,shipping:t.shipping,total:t.total,createdAt:Date.now(),updatedAt:R7F.now()}}async function sendKitchen(){if(!cart.length)return toast('السلة فارغة','err');try{await R7F.push('orders',orderData('kitchen'));cart=[];saveCart();closeCart();toast('تم إرسال الطلب للمطبخ')}catch(e){toast(R7F.errorMessage(e),'err')}}async function sendWhatsapp(){if(!cart.length)return toast('السلة فارغة','err');try{const o=orderData('whatsapp');await R7F.push('orders',o);const lines=[`طلب جديد ${o.orderNo}`,tableNo?`الطاولة: ${tableNo}`:'طلب خارج المطعم',o.shippingRegion?`منطقة التوصيل: ${o.shippingRegion}`:'',...cart.map(i=>`${i.qty} × ${i.name} = ${R7F.money(i.qty*i.price,settings.currency)}`),o.shippingFee?`التوصيل: ${R7F.money(o.shippingFee,settings.currency)}`:'',`الإجمالي: ${R7F.money(o.total,settings.currency)}`,o.note?`ملاحظة: ${o.note}`:''].filter(Boolean);const phone=(settings.whatsapp||'').replace(/\D/g,'');if(phone) window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(lines.join('\n')),'_blank');cart=[];saveCart();closeCart();toast('تم تجهيز رسالة واتساب وحفظ الطلب')}catch(e){toast(R7F.errorMessage(e),'err')}}function openOrders(){renderOrders();$('ordersModal').classList.add('show')}function closeOrders(){$('ordersModal').classList.remove('show')}function renderOrders(){const arr=R7F.list(orders).filter(o=>o.customerDevice===customerDevice).sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0));$('myOrders').innerHTML=arr.map(o=>`<div class="orderCard"><div class="row"><div><h3 style="margin:0">${esc(o.orderNo)}</h3><div style="color:#64748b;font-weight:800">${R7F.localDate(o.createdAt)}</div></div><span class="pill">${R7F.statusLabel(o.status)}</span></div><div style="margin-top:10px;color:#475569;font-weight:800">${(o.items||[]).map(i=>`${esc(i.name)} × ${i.qty}`).join('، ')}</div><div class="row" style="margin-top:10px"><b class="price">${R7F.money(o.total||R7F.totals(o.items,settings,{shippingFee:o.shippingFee}).total,settings.currency)}</b><button class="light" onclick="downloadOrderInvoice('${esc(o.id)}')">تحميل الفاتورة صورة</button></div><div style="display:flex;justify-content:center;margin-top:12px">${R7F.invoiceHtml(o,'ord_'+o.id,settings)}</div></div>`).join('')||'<div class="empty">لا توجد طلبات لهذا الجهاز حتى الآن.</div>'}async function downloadOrderInvoice(id){try{await R7F.ensureHtml2Canvas();const el=document.getElementById('print_ord_'+id);const canvas=await html2canvas(el,{backgroundColor:'#fff',scale:2});R7F.downloadDataUrl(canvas.toDataURL('image/png'),'order-'+id+'.png')}catch(e){toast(R7F.errorMessage(e),'err')}}R7F.ready().then(()=>{R7F.watch('settings',v=>{settings=R7F.settingsWithDefaults(v);render();renderCart();renderOrders()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('categories',v=>{categories=v||{};categoriesLoaded=true;render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('products',v=>{products=v||{};productsLoaded=true;render()},e=>toast(R7F.errorMessage(e),'err'));R7F.watch('orders',v=>{orders=v||{};renderOrders()},e=>toast(R7F.errorMessage(e),'err'))}).catch(e=>toast(R7F.errorMessage(e),'err'));render();

<div class="optModal" id="optModal"><div class="optPanel"><div class="row"><h2 id="optTitle" style="margin:0">اختيارات الوجبة</h2><button class="light" onclick="closeOptions()">×</button></div><div id="optBody"></div></div></div>
<script>
(function(){
  function esc2(s){return (window.R7F&&R7F.escapeHtml?R7F.escapeHtml(s):String(s||''));}
  function parseExtras(v){if(Array.isArray(v))return v;return String(v||'').split(/\n|،|,/).map(x=>x.trim()).filter(Boolean).map(x=>{let p=x.split(':');return {name:p[0].trim(),price:Number(p[1]||0)}})}
  function parseRemoves(v){if(Array.isArray(v))return v;return String(v||'').split(/\n|،|,/).map(x=>x.trim()).filter(Boolean)}
  var pending=null, selectedExtras=[], selectedRemoves=[];
  window.closeOptions=function(){var m=document.getElementById('optModal'); if(m)m.classList.remove('show')}
  window.toggleExtra=function(i){var ex=pending.extras[i]; var k=selectedExtras.findIndex(x=>x.name===ex.name); if(k>=0)selectedExtras.splice(k,1);else selectedExtras.push(ex); renderOptionsBody()}
  window.toggleRemove=function(i){var r=pending.removes[i]; var k=selectedRemoves.indexOf(r); if(k>=0)selectedRemoves.splice(k,1);else selectedRemoves.push(r); renderOptionsBody()}
  window.renderOptionsBody=function(){if(!pending)return; var extraCost=selectedExtras.reduce((a,x)=>a+Number(x.price||0),0); var body=document.getElementById('optBody'); body.innerHTML='<div class="optLine"><b>'+esc2(pending.name)+'</b><b class="price">'+R7F.money(Number(pending.price||0)+extraCost,settings.currency)+'</b></div>'+(pending.extras.length?'<h3>الإضافات</h3><div class="optGrid">'+pending.extras.map((x,i)=>'<button class="optChip '+(selectedExtras.some(e=>e.name===x.name)?'active':'')+'" onclick="toggleExtra('+i+')">'+esc2(x.name)+(x.price?' + '+R7F.money(x.price,settings.currency):'')+'</button>').join('')+'</div>':'')+(pending.removes.length?'<h3>احذف من الوجبة</h3><div class="optGrid">'+pending.removes.map((x,i)=>'<button class="optChip '+(selectedRemoves.includes(x)?'active':'')+'" onclick="toggleRemove('+i+')">'+esc2(x)+'</button>').join('')+'</div>':'')+'<h3>ملاحظة للمطبخ</h3><textarea id="optNote" class="optNote" placeholder="مثلاً: بدون فلفل / زيادة صوص"></textarea><button class="primary" style="width:100%;margin-top:12px" onclick="confirmOptions()">إضافة للسلة</button>';}
  window.confirmOptions=function(){if(!pending)return; var extraCost=selectedExtras.reduce((a,x)=>a+Number(x.price||0),0); cart.push({id:pending.id,name:pending.name,price:Number(pending.price||0)+extraCost,image:pending.image||'',qty:1,extras:selectedExtras.map(x=>x.name+(x.price?' +'+x.price:'')),removes:selectedRemoves.slice(),note:(document.getElementById('optNote')||{}).value||''}); saveCart(); closeOptions(); toast('تمت الإضافة للسلة')}
  window.addCart=function(id){var p={id:id,...(products[id]||{})}; var extras=parseExtras(p.extras), removes=parseRemoves(p.removes); if(extras.length||removes.length){pending={...p,extras:extras,removes:removes};selectedExtras=[];selectedRemoves=[];document.getElementById('optTitle').textContent='اختيارات '+(p.name||'الوجبة');document.getElementById('optModal').classList.add('show');renderOptionsBody();return;} var existing=cart.find(i=>i.id===id&&!i.extras&&!i.removes); if(existing)existing.qty++;else cart.push({id:p.id,name:p.name,price:Number(p.price||0),image:p.image||'',qty:1}); saveCart();toast('تمت الإضافة للسلة')}
})();
</script>

<script id="restaurant-payment-drawer-patch">
